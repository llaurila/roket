name: "LEVEL 2: VELOCITY CONTROL"
description: >
  ACCELERATE TO GREAT SPEEDS, TURN AROUND AND DECELERATE BACK TO FULL STOP.

soundtrack: chase

variables:
  LOW_SPEED_THRESHOLD: 10
  HIGH_SPEED_THRESHOLD: 100

ship:
  fuelTank:
    currentAmount: 100

objectives:
  - id: accerelate
    title: ACCELERATE TO ${thresholdHigh} M/S
    externalSuccessCheck: fast
  - id: decelerate
    title: DECELERATE BACK TO <${thresholdLow} M/S
    externalSuccessCheck: slow
    dependsOn: accerelate
