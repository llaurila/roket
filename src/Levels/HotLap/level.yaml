name: "LEVEL 6: HOT LAP"
description: >
  REACH ALL FOUR BEACONS AS FAST AS POSSIBLE.

variables:
  TIME_LIMIT: 60

ship:
  fuelTank:
    currentAmount: 400

objects:
  - id: beacon-1
    type: beacon
    position: [100, 0]
  - id: beacon-2
    type: beacon
    position: [0, 100]
  - id: beacon-3
    type: beacon
    position: [-100, 0]
  - id: beacon-4
    type: beacon
    position: [0, -100]

objectives:
  - id: beacon-1
    title: REACH BEACON 1
    externalSuccessCheck: beacon1Reached
  - id: beacon-2
    title: REACH BEACON 2
    externalSuccessCheck: beacon2Reached
    dependsOn: beacon-1
  - id: beacon-3
    title: REACH BEACON 3
    externalSuccessCheck: beacon3Reached
    dependsOn: beacon-2
  - id: beacon-4
    title: REACH BEACON 4
    externalSuccessCheck: beacon4Reached
    externalFailureCheck:
      test: timeExceeded
      message: TOO SLOW
    dependsOn: beacon-3
