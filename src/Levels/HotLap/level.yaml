name: "LEVEL 6: HOT LAP"
description: >
  FLY THROUGH ALL BEACONS TO COMPLETE A LAP.

ship:
  fuelTank:
    currentAmount: 150

objects:
  - id: beacon-1
    type: beacon
    position: [0, 50]
  - id: beacon-2
    type: beacon
    position: [50, 0]
  - id: beacon-3
    type: beacon
    position: [0, -50]

objectives:
  - id: beacon-1
    title: REACH BEACON 1
    externalSuccessCheck: { test: beaconReached, args: [beacon-1] }
  - id: beacon-2
    title: REACH BEACON 2
    externalSuccessCheck: { test: beaconReached, args: [beacon-2] }
    dependsOn: beacon-1
  - id: beacon-3
    title: REACH BEACON 3
    externalSuccessCheck: { test: beaconReached, args: [beacon-3] }
    dependsOn: beacon-2
  