name: "LEVEL 1: INTRODUCTION"
description: >
  GROUND CONTROL TO ${playerName}:
   
  FAMILIARISE YOURSELF WITH THE CONTROLS AND ACQUIRE ONE FUEL CAPSULE.
  ACCELERATE (PRESS <UP> KEY) TO START. 
   
  <LEFT> AND <RIGHT> KEYS FIRE THE THRUSTERS SEPARATELY AND <SHIFT> KEY
  REDUCES THRUST POWER FOR FINER CONTROL.

soundtrack: ambient

ship:
  fuelTank:
    currentAmount: 150

objects:
  - id: fuel
    type: fuel
    position: [20, 45]
    angularVelocity: .21

objectives:
  - id: collect-fuel
    title: COLLECT A FUEL CAPSULE
    successChecks:
      - type: kill
        target: fuel
