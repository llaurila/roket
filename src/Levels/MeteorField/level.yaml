name: "LEVEL 9: METEOR FIELD"
description: >
  COLLECT ALL THE FUEL CAPSULES REVEALED BY THE RADAR (${total} IN TOTAL).
  THIS TIME, YOU'LL ALSO HAVE TO DODGE METEORS.

soundtrack: focus

randomSeed: 70978

variables:
   FUEL_CAPSULE_COUNT: 3
   FUEL_CAPSULE_DISTANCE_MIN: 100
   FUEL_CAPSULE_DISTANCE_MAX: 150
   METEOR_COUNT: 5
   METEOR_DISTANCE_MIN: 40
   METEOR_DISTANCE_MAX: 90
   METEOR_MASS_MIN: 800
   METEOR_MASS_MAX: 1400

ship:
  fuelTank:
    currentAmount: 150
  weapons: [laser]
  shield:
    enabled: true

objectives:
  - id: collect-fuel
    title: COLLECT ALL FUEL CAPSULES (${collected}/${total})
    externalSuccessCheck: allCollected
