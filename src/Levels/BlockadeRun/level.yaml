name: "LEVEL 11: BLOCKADE RUN"
description: >
  COLLECT AT LEAST ${required} OF ${total} FUEL CAPSULES.
  A GUARD SHIP WILL HUNT YOU DOWN AND TRY TO RAM YOU.
  COLLIDING WITH IT WILL DESTROY YOUR SHIP.

soundtrack: chase

randomSeed: 97531

variables:
  FUEL_CAPSULE_COUNT: 12
  REQUIRED_FUEL_CAPSULES: 6
  FUEL_CAPSULE_DISTANCE_MIN: 80
  FUEL_CAPSULE_DISTANCE_MAX: 520
  OTHER_SHIP_OFFSET: [-140, 110]
  OTHER_SHIP_HEADING: 2.2
  AI_ARRIVE_RADIUS: 10
  AI_ARRIVE_SPEED: 3
  AI_MAX_CLOSING_SPEED: 18
  AI_POSITION_GAIN: 0.065
  AI_VELOCITY_GAIN: 1
  AI_STOP_VELOCITY_GAIN: 1.2
  AI_MAX_POSITION_ACCELERATION: 6
  AI_HEADING_GAIN: 5.4
  AI_ANGULAR_DAMPING: 2
  AI_MAX_THRUST_ANGLE_DEG: 45
  AI_ALIGNMENT_EXPONENT: 1.3
  AI_TURN_THROTTLE_PENALTY: 0.5
  ENEMY_COLOR: { R: 1, G: .35, B: .2, A: 1 }

ship:
  fuelTank:
    currentAmount: 170

objectives:
  - id: collect-target
    title: COLLECT ${required} FUEL CAPSULES (${collected}/${total})
    externalSuccessCheck: fuelTargetReached
