name: "LEVEL 7: FUEL RUSH"
description: >
  COLLECT MORE FUEL CAPSULES THAN THE OTHER SHIP. THERE ARE ${total} OF THEM.
  YOU WIN IF YOU COLLECT MORE THAN HALF.
  YOU LOSE AS SOON AS THE OTHER SHIP COLLECTS HALF OR MORE.
   
  COLLIDING WITH IT WILL DESTROY YOUR SHIP.

soundtrack: focus

randomSeed: 43213

variables:
  FUEL_CAPSULE_COUNT: 8
  FUEL_CAPSULE_DISTANCE_MIN: 145
  FUEL_CAPSULE_DISTANCE_MAX: 500
  OTHER_SHIP_OFFSET: [-20, 60]
  OTHER_SHIP_HEADING: 1.8
  AI_ARRIVE_RADIUS: 14
  AI_ARRIVE_SPEED: 2
  AI_MAX_CLOSING_SPEED: 10
  AI_POSITION_GAIN: 0.05
  AI_VELOCITY_GAIN: 0.85
  AI_STOP_VELOCITY_GAIN: 1.4
  AI_MAX_POSITION_ACCELERATION: 5
  AI_HEADING_GAIN: 5
  AI_ANGULAR_DAMPING: 2.2
  AI_MAX_THRUST_ANGLE_DEG: 50
  AI_ALIGNMENT_EXPONENT: 1.5
  AI_TURN_THROTTLE_PENALTY: 0.7
  ENEMY_COLOR: { R: 1, G: .2, B: .2, A: 1 }

ship:
  fuelTank:
    currentAmount: 150

objectives:
  - id: fuel-rush
    title: "COLLECT FUEL (YOU: ${playerScore} ENEMY: ${enemyScore})"
    externalSuccessCheck: playerWon
    externalFailureCheck:
      test: playerLost
      message: THE OTHER SHIP COLLECTED MORE FUEL THAN YOU.
