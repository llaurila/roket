name: "LEVEL 4: DEEP SPACE MISSION"
description: >
  ACCELERATE TO HIGH VELOCITY TO COLLECT THE FAR AWAY FUEL CAPSULE AS FAST
  AS POSSIBLE AND RETURN BACK TO COLLECT THE OTHER OTHER CAPSULE.

ship:
  fuelTank:
    currentAmount: 500

objects:
  - id: near-fuel
    type: fuel
    position: [0, -44]
    angularVelocity: -1
  - id: far-fuel
    type: fuel
    position: [-48818, 87274]
    angularVelocity: 1
    props:
      amount: 250

objectives:
  - id: far-fuel
    title: COLLECT THE FAR FUEL CAPSULE 
    externalSuccessCheck: farFuelCollected
    externalFailureCheck:
      test: nearFuelCollected
      message: FAILED TO COLLECT THE FAR FUEL CAPSULE FIRST.
  - id: near-fuel
    title: COLLECT THE NEAR FUEL CAPSULE
    externalSuccessCheck: nearFuelCollected
    dependsOn: far-fuel
