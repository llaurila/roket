name: "LEVEL 4: DEEP SPACE MISSION"
description: >
  ACCELERATE TO HIGH VELOCITY TO COLLECT THE FAR AWAY FUEL CAPSULE AS FAST
  AS POSSIBLE. THEN RETURN BACK TO THE BEACON.

ship:
  fuelTank:
    currentAmount: 500

objects:
  - id: near-beacon
    type: beacon
    position: [0, -44]
  - id: far-fuel
    type: fuel
    position: [-48818, 87274]
    angularVelocity: 1
    props:
      amount: 250

objectives:
  - id: far-fuel
    title: COLLECT THE FAR FUEL CAPSULE 
    externalSuccessCheck: farFuelCollected
  - id: near-beacon
    title: RETURN TO THE BEACON
    externalSuccessCheck: nearBeaconReached
    dependsOn: far-fuel
